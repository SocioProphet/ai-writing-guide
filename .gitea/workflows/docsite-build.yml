# Doc Site Build Validation
#
# Validates that the documentation site builds successfully when docs change.
# Catches broken links, bad config, and build errors before merge.

name: Docsite Build

on:
  push:
    branches: [main, develop]
    paths: ['docs/**']
  pull_request:
    branches: [main, develop]
    paths: ['docs/**']

jobs:
  build-docs:
    name: Build Documentation Site
    runs-on: ubuntu-latest
    container: node:20
    timeout-minutes: 15

    steps:
      - name: Checkout AIWG
        uses: actions/checkout@v4

      - name: Clone dbbuilder
        run: |
          git clone https://git.integrolabs.net/roctinam/dbbuilder.git /tmp/dbbuilder

      - name: Install dbbuilder dependencies
        working-directory: /tmp/dbbuilder/apps/publisher
        run: npm ci

      - name: Configure tenant
        run: |
          cat > /tmp/dbbuilder/apps/publisher/tenants.json <<'TENANTS'
          [
            {
              "id": "aiwg-docs",
              "source": {
                "type": "local",
                "path": "${{ gitea.workspace }}/docs"
              },
              "domains": ["docs.aiwg.io"],
              "strictLinks": true
            }
          ]
          TENANTS

      - name: Build doc site
        working-directory: /tmp/dbbuilder/apps/publisher
        run: node scripts/build-tenants.js aiwg-docs

      - name: Verify build output
        run: |
          ls -la /tmp/dbbuilder/apps/publisher/dist/aiwg-docs/
          echo "Build successful"
